name: CI (Node)

on:
  push:
    branches: [main]
    paths:
      - "packages/node/**"
      - "specs/**"
      - ".github/workflows/ci-node.yml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "packages/node/**"
      - "specs/**"
      - ".github/workflows/ci-node.yml"
      - "pnpm-workspace.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vendorval typecheck
      - run: pnpm --filter vendorval test
      - run: pnpm --filter vendorval build
