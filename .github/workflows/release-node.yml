name: Release (Node)

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (latest, next, beta…)"
        required: false
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Node 24 ships with npm >= 11, which is required for Trusted Publishing
      # OIDC token exchange. Avoids the npm self-upgrade race that bites Node 22.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter vendorval-sdk typecheck
      - run: pnpm --filter vendorval-sdk test
      - run: pnpm --filter vendorval-sdk build

      - name: Resolve dist-tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == *"-rc."* || "${GITHUB_REF_NAME}" == *"-beta."* ]]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      # Bootstrap publish: npm Trusted Publishing requires the package to
      # already exist on the registry before a Trusted Publisher can be
      # configured for it. So the very first release of `vendorval-sdk`
      # authenticates with NPM_TOKEN; subsequent releases will switch to
      # pure OIDC (token removed) once the Trusted Publisher is set up
      # in the package settings on npmjs.com.
      #
      # `--provenance` still works alongside a token: the publish auth uses
      # the token, while the provenance attestation is signed via the
      # GitHub OIDC id-token (id-token: write above).
      - name: Publish to npm
        working-directory: packages/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing with dist-tag: ${{ steps.tag.outputs.value }}"
          npm publish \
            --access public \
            --provenance \
            --tag "${{ steps.tag.outputs.value }}"
